<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFit Tracker</title>
    <meta name="description" content="モダンでパーソナルなジムトレーニング記録アプリ。">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00C4AE">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GymFit">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="glass-nav">
            <h1 class="logo">GymFit</h1>
            <ul class="nav-links">
                <li><button onclick="app.navigate('home')" class="nav-btn active" id="nav-home">Home</button></li>
                <li><button onclick="app.navigate('stats')" class="nav-btn" id="nav-stats">Stats</button></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main id="content-area">

            <!-- Home View -->
            <section id="view-home" class="view active">
                <div class="hero-card" id="hero-card">
                    <h2>今日のトレーニングを始めましょう</h2>
                    <p id="current-status-text">現在トレーニングは行っていません</p>
                    <button id="btn-start-session" class="primary-btn pulse" onclick="app.startSession()">トレーニングを開始</button>
                </div>

                <div id="active-session-area" class="hidden">
                    <div class="session-info glass-card">
                        <div class="session-info-row">
                            <div class="session-time-block">
                                <span class="session-label">トレーニング時間</span>
                                <span class="timer" id="session-timer">00:00:00</span>
                            </div>
                            <button id="btn-end-session" class="danger-btn-sm" onclick="app.endSession()">トレーニングを終了</button>
                        </div>
                    </div>

                    <div class="add-exercise-card glass-card">
                        <div class="form-group row">
                            <div class="input-col machine-no-col">
                                <input type="text" id="input-machine-no" placeholder="例: M01" oninput="app.checkForMachineHistory()">
                            </div>
                            <div class="input-col">
                                <input type="text" id="input-machine-name" placeholder="例: チェストプレス" oninput="app.checkForMachineHistoryByName()">
                            </div>
                        </div>

                        <div id="history-hint" class="hint-text"></div>

                        <div class="sets-container" id="sets-input-container">
                            <!-- Dynamically populated by app.renderSetInputs() -->
                        </div>
                        <div class="set-controls">
                            <div class="set-ctrl-group">
                                <button class="set-ctrl-btn" onclick="app.removeSet()">−</button>
                                <span id="set-count-display">3</span>
                                <button class="set-ctrl-btn" onclick="app.addSet()">＋</button>
                            </div>
                            <button class="record-btn" onclick="app.addExercise()">この種目を記録</button>
                        </div>
                    </div>

                    <div id="current-exercises-list"></div>
                </div>

                <div class="recent-sessions glass-card mt-2">
                    <h3>最近のセッション</h3>
                    <div id="recent-sessions-list"></div>
                </div>
            </section>

            <!-- Stats View -->
            <section id="view-stats" class="view hidden">

                <!-- サマリー -->
                <div class="glass-card">
                    <h2>トレーニング統計</h2>
                    <div class="stats-overview stats-3col mt-1">
                        <div class="stat-box">
                            <span class="stat-label">合計</span>
                            <span class="stat-value" id="stat-total-count">0<small>回</small></span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">今月</span>
                            <span class="stat-value" id="stat-monthly-count">0<small>回</small></span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">連続記録</span>
                            <span class="stat-value" id="stat-streak">0<small>日</small></span>
                        </div>
                    </div>
                    <div class="stats-overview mt-1">
                        <div class="stat-box">
                            <span class="stat-label">今週の時間</span>
                            <span class="stat-value" id="stat-weekly-time">0<small>時間</small>0<small>分</small></span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">今週のセッション</span>
                            <span class="stat-value" id="stat-weekly-count">0<small>回</small></span>
                        </div>
                    </div>
                </div>

                <!-- 週別グラフ -->
                <div class="glass-card mt-1">
                    <h3>週別セッション数（過去6週）</h3>
                    <div id="weekly-bar-chart" class="chart-container mt-1"></div>
                </div>

                <!-- データ管理 -->
                <div class="glass-card mt-1">
                    <h3>データ管理・同期</h3>

                    <!-- 自動同期コード -->
                    <div class="sync-section">
                        <p class="data-mgmt-desc">
                            同期コードを使ってデータをクラウドに自動保存します。<br>
                            機種変更時は新しいiPhoneで同じコードを入力するだけで復元できます。
                        </p>
                        <div class="sync-code-row">
                            <div class="sync-code-display">
                                <span class="sync-label">同期コード</span>
                                <span id="sync-code-value" class="sync-code">------</span>
                            </div>
                            <button class="sync-copy-btn" onclick="app.copySyncCode()">コピー</button>
                        </div>
                        <div class="sync-input-row mt-1">
                            <input type="text" id="sync-code-input" placeholder="別のコードを入力（機種変更時）" maxlength="9" style="text-transform:uppercase">
                            <button class="record-btn" style="width:auto;padding:0.4rem 0.8rem" onclick="app.applySyncCode()">適用</button>
                        </div>
                        <div id="sync-status" class="sync-status"></div>
                    </div>

                    <!-- エクスポート/インポート -->
                    <div class="data-mgmt-section mt-2">
                        <p class="data-mgmt-desc">手動バックアップ（同期コードが使えない場合のみ）</p>
                        <div class="data-mgmt-buttons">
                            <button class="export-btn" onclick="app.exportData()">エクスポート</button>
                            <button class="import-btn" onclick="app.importData()">インポート</button>
                        </div>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <!-- Firebase SDK (compat v10) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-sync.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
