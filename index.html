<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFit Tracker</title>
    <meta name="description" content="モダンでパーソナルなジムトレーニング記録アプリ。">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00E676">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GymFit">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="glass-nav">
            <h1 class="logo">GymFit</h1>
            <ul class="nav-links">
                <li><button onclick="app.navigate('home')" class="nav-btn active" id="nav-home">Home</button></li>
                <li><button onclick="app.navigate('stats')" class="nav-btn" id="nav-stats">Stats</button></li>
                <li><button onclick="app.navigate('search')" class="nav-btn" id="nav-search">Search</button></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main id="content-area">
            
            <!-- Home View -->
            <section id="view-home" class="view active">
                <div class="hero-card" id="hero-card">
                    <h2>今日のトレーニングを始めましょう</h2>
                    <p id="current-status-text">現在トレーニングは行っていません</p>
                    <button id="btn-start-session" class="primary-btn pulse" onclick="app.startSession()">トレーニングを開始</button>
                </div>

                <div id="active-session-area" class="hidden">
                    <div class="session-info glass-card">
                        <div class="session-info-row">
                            <div class="session-time-block">
                                <span class="session-label">トレーニング時間</span>
                                <span class="timer" id="session-timer">00:00:00</span>
                            </div>
                            <button id="btn-end-session" class="danger-btn-sm" onclick="app.endSession()">トレーニングを終了</button>
                        </div>
                    </div>

                    <div class="add-exercise-card glass-card">
                        <div class="form-group row">
                            <div class="input-col machine-no-col">
                                <input type="text" id="input-machine-no" placeholder="例: M01" oninput="app.checkForMachineHistory()">
                            </div>
                            <div class="input-col">
                                    <input type="text" id="input-machine-name" placeholder="例: チェストプレス" oninput="app.checkForMachineHistoryByName()">
                            </div>
                        </div>
                        
                        <div id="history-hint" class="hint-text"></div>

                        <div class="sets-container" id="sets-input-container">
                            <!-- Dynamically populated by app.renderSetInputs() -->
                        </div>
                        <div class="set-controls">
                            <button class="set-ctrl-btn" onclick="app.removeSet()">−</button>
                            <span id="set-count-display">3</span>
                            <button class="set-ctrl-btn" onclick="app.addSet()">＋</button>
                            <button class="record-btn" onclick="app.addExercise()">この種目を記録</button>
                        </div>
                    </div>

                    <div id="current-exercises-list">
                        <!-- Dynamically populated exercises -->
                    </div>
                </div>
                
                <div class="recent-sessions glass-card mt-2">
                    <h3>最近のセッション</h3>
                    <div id="recent-sessions-list"></div>
                </div>
            </section>

            <!-- Stats View -->
            <section id="view-stats" class="view hidden">
                <div class="glass-card full-height">
                    <h2>トレーニング統計</h2>
                    <div class="stats-overview">
                        <div class="stat-box">
                            <span class="stat-label">今週の合計時間</span>
                            <span class="stat-value" id="stat-weekly-time">0時間 0分</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">今週のセッション数</span>
                            <span class="stat-value" id="stat-weekly-count">0</span>
                        </div>
                    </div>
                    
                    <div class="mt-2">
                        <h3>週別セッション数（過去6週）</h3>
                        <div id="weekly-bar-chart" class="chart-container mt-1"></div>
                    </div>
                    <div class="mt-2">
                        <h3>過去の記録</h3>
                        <ul id="past-sessions-detailed"></ul>
                    </div>

                    <div class="data-mgmt-section mt-2">
                        <h3>データ管理</h3>
                        <p class="data-mgmt-desc">機種変更時はエクスポートしてバックアップを保存し、新しいiPhoneでインポートしてください。</p>
                        <div class="data-mgmt-buttons">
                            <button class="export-btn" onclick="app.exportData()">エクスポート（バックアップ）</button>
                            <button class="import-btn" onclick="app.importData()">インポート（復元）</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Search View -->
            <section id="view-search" class="view hidden">
                <div class="glass-card full-height">
                    <h2>マシン履歴検索</h2>
                    <p>マシン番号を入力して過去の負荷推移を確認します。</p>
                    <div class="search-bar">
                        <input type="text" id="search-machine-input" placeholder="マシン番号を入力...">
                        <button class="primary-btn" onclick="app.searchMachine()">検索</button>
                    </div>
                    
                    <div id="search-results" class="mt-2">
                        <!-- Search results land here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        // Register service worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
