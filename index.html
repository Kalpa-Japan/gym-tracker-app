<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFit Tracker</title>
    <meta name="description" content="モダンでパーソナルなジムトレーニング記録アプリ。">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="glass-nav">
            <h1 class="logo">GymFit</h1>
            <ul class="nav-links">
                <li><button onclick="app.navigate('home')" class="nav-btn active" id="nav-home">Home</button></li>
                <li><button onclick="app.navigate('stats')" class="nav-btn" id="nav-stats">Stats</button></li>
                <li><button onclick="app.navigate('search')" class="nav-btn" id="nav-search">Search</button></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main id="content-area">
            
            <!-- Home View -->
            <section id="view-home" class="view active">
                <div class="hero-card">
                    <h2>今日のトレーニングを始めましょう</h2>
                    <p id="current-status-text">現在トレーニングは行っていません</p>
                    <button id="btn-start-session" class="primary-btn pulse" onclick="app.startSession()">トレーニングを開始</button>
                    <button id="btn-end-session" class="danger-btn hidden" onclick="app.endSession()">トレーニングを終了</button>
                </div>

                <div id="active-session-area" class="hidden">
                    <div class="session-info glass-card">
                        <h3>トレーニング中...</h3>
                        <p>開始時間: <span id="session-start-time"></span></p>
                        <p class="timer" id="session-timer">00:00:00</p>
                    </div>

                    <div class="add-exercise-card glass-card">
                        <h3>種目を追加</h3>
                        <div class="form-group row">
                            <div class="input-col">
                                <label>マシン番号</label>
                                <input type="text" id="input-machine-no" placeholder="例: M01" oninput="app.checkForMachineHistory()">
                            </div>
                            <div class="input-col">
                                <label>種目</label>
                                <input type="text" id="input-machine-name" placeholder="例: チェストプレス">
                            </div>
                        </div>
                        
                        <div id="history-hint" class="hint-text"></div>

                        <div class="sets-container">
                            <div class="set-row">
                                <span>Set 1</span>
                                <input type="number" id="input-load-1" placeholder="負荷 (kg)" class="mini-input">
                                <input type="number" id="input-reps-1" placeholder="回数" class="mini-input">
                            </div>
                            <div class="set-row">
                                <span>Set 2</span>
                                <input type="number" id="input-load-2" placeholder="負荷 (kg)" class="mini-input">
                                <input type="number" id="input-reps-2" placeholder="回数" class="mini-input">
                            </div>
                            <div class="set-row">
                                <span>Set 3</span>
                                <input type="number" id="input-load-3" placeholder="負荷 (kg)" class="mini-input">
                                <input type="number" id="input-reps-3" placeholder="回数" class="mini-input">
                            </div>
                        </div>
                        <button class="secondary-btn" onclick="app.addExercise()">この種目を記録</button>
                    </div>

                    <div id="current-exercises-list">
                        <!-- Dynamically populated exercises -->
                    </div>
                </div>
                
                <div class="recent-sessions glass-card mt-2">
                    <h3>最近のセッション</h3>
                    <div id="recent-sessions-list"></div>
                </div>
            </section>

            <!-- Stats View -->
            <section id="view-stats" class="view hidden">
                <div class="glass-card full-height">
                    <h2>トレーニング統計</h2>
                    <div class="stats-overview">
                        <div class="stat-box">
                            <span class="stat-label">今週の合計時間</span>
                            <span class="stat-value" id="stat-weekly-time">0時間 0分</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">今週のセッション数</span>
                            <span class="stat-value" id="stat-weekly-count">0</span>
                        </div>
                    </div>
                    
                    <div class="stats-chart-placeholder mt-2">
                        <!-- Simple visual representation could go here -->
                        <h3>過去の記録</h3>
                        <ul id="past-sessions-detailed"></ul>
                    </div>
                </div>
            </section>

            <!-- Search View -->
            <section id="view-search" class="view hidden">
                <div class="glass-card full-height">
                    <h2>マシン履歴検索</h2>
                    <p>マシン番号を入力して過去の負荷推移を確認します。</p>
                    <div class="search-bar">
                        <input type="text" id="search-machine-input" placeholder="マシン番号を入力...">
                        <button class="primary-btn" onclick="app.searchMachine()">検索</button>
                    </div>
                    
                    <div id="search-results" class="mt-2">
                        <!-- Search results land here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
